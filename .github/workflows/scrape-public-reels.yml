name: 🎬 Scrape Public Reels by Username & Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */6 * * *'   # har 6 ghante mein automatically chalega

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Test proxy connectivity
        env:
          PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
        run: |
          curl --proxy "$PROXY_URL" https://ipv4.webshare.io/ -v --max-time 15

      - name: Run public reels scraper
        env:
          PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
        run: python public_reels_scraper.py

      - name: Commit & push new reels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped_reels/
          git diff --staged --quiet || git commit -m "🤖 Auto: public reels scraped $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
